<style>
  /* ═══════════════════════════════════════════════

    --bg-deepest: #0b0d12;

    --bg-mid: #15182280;

<div id="modal-channel" class="modal-overlay hidden">
  <div class="modal">
    <h3>Create Channel</h3>
    <div class="input-group">
      <label>Channel Name</label>
      <input type="text" id="new-ch-name" placeholder="new-channel">
    </div>
    <div class="input-group" style="display:flex;align-items:center;gap:8px;margin-bottom:0;">
      <input type="checkbox" id="new-ch-readonly">
      <label for="new-ch-readonly" style="font-size:12px;color:var(--text-dim);">Read‑only (only admins can send)</label>
    </div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModals()">Cancel</button>
      <button class="btn-action" onclick="createChannel()">Create Channel</button>
    </div>
  </div>
</div>

<!-- The rest of the HTML (settings modal, profile modal, etc.) is unchanged. -->

<script type="module">
  // ... Firebase initialization (unchanged) ...
</script>

<script>
  // ========== GLOBAL HELPERS ==========
  // ... (all existing helper functions are unchanged) ...

  // ========== Updated functions below ==========

  function openCreateChannel() {
    document.getElementById('modal-channel').classList.remove('hidden');
    document.getElementById('new-ch-readonly').checked = false;   // reset checkbox
  }

  function createChannel() {
    const nameInp = document.getElementById('new-ch-name');
    const baseName = nameInp.value.trim().toLowerCase().replace(/\s+/g, '-');
    if (!baseName) return;
    const readonly = document.getElementById('new-ch-readonly').checked;
    const chRef = window.fbRef(window.db, 'channels');
    window.fbOnValue(chRef, (snap) => {
      const data = snap.val() || {};
      const existingNames = Object.values(data).map(ch => ch.name);
      let finalName = baseName;
      let counter = 2;
      while (existingNames.includes(finalName)) {
        finalName = `${baseName}-${counter}`;
        counter++;
      }
      createChannelRaw(finalName, readonly);
    }, { onlyOnce: true });
    nameInp.value = '';
    closeModals();
  }

  function createChannelRaw(name, readonly = false) {
    const newRef = window.fbPush(window.fbRef(window.db, 'channels'));
    window.fbSet(newRef, { name, readonly, order: 9999 });   // put new channels at the end
  }

  // ── CHANNEL LIST (WITH REORDERING) ─────────────────────
  let draggedItem = null;

  function handleDragStart(e) {
    draggedItem = this;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/html', this.innerHTML);
  }

  function handleDragEnd(e) {
    this.classList.remove('dragging');
    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('drag-over'));
    draggedItem = null;
  }

  function handleDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (this !== draggedItem) {
      document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('drag-over'));
      this.classList.add('drag-over');
    }
  }

  function handleDrop(e) {
    e.stopPropagation();
    e.preventDefault();
    if (!draggedItem || draggedItem === this) return;

    const list = document.getElementById('channels-container');
    const items = Array.from(list.querySelectorAll('.channel-item'));
    const fromIndex = items.indexOf(draggedItem);
    const toIndex   = items.indexOf(this);

    list.insertBefore(draggedItem, toIndex > fromIndex ? this.nextSibling : this);

    // Save new order to Firebase
    const updates = {};
    const currentItems = document.querySelectorAll('.channel-item');
    currentItems.forEach((el, idx) => {
      updates[`${el.dataset.chId}/order`] = idx;
    });
    window.fbUpdate(window.fbRef(window.db, 'channels'), updates);
  }

  function initChannels() {
    const chRef = window.fbRef(window.db, 'channels');
    window.fbOnValue(chRef, (snap) => {
      const list = document.getElementById('channels-container');
      list.innerHTML = '';
      const data = snap.val() || {};

      if (Object.keys(data).length === 0) {
        if (currentUser.uid === ADMIN_UID) {
          createChannelRaw('rules');
          createChannelRaw('general');
        }
        return;
      }

      rulesChannelId = null;
      const channelsArray = [];
      Object.keys(data).forEach(id => {
        const ch = data[id];
        if (ch.name === 'rules') rulesChannelId = id;
        channelsArray.push({ id, ...ch });
      });

      channelsArray.sort((a, b) => {
        if (a.order !== undefined && b.order !== undefined) return a.order - b.order;
        return a.name.localeCompare(b.name);
      });

      channelsArray.forEach(ch => {
        const name    = ch.name;
        const isRules = name === 'rules';
        const isAdmin = currentUser.uid === ADMIN_UID;
        const locked  = !isAdmin && !rulesAccepted && !isRules;

        const div = document.createElement('div');
        div.className = 'channel-item'
          + (ch.id === currentChannelId ? ' active'    : '')
          + (isRules                 ? ' ch-rules'  : '')
          + (locked                  ? ' ch-locked' : '');
        div.dataset.chId = ch.id;
        div.draggable = isAdmin && !isRules;   // rules channel stays at top, not draggable

        if (isAdmin) {
          const handle = document.createElement('span');
          handle.className = 'drag-handle';
          handle.innerHTML = '<i class="fa fa-grip-vertical"></i>';
          handle.onclick = (e) => e.stopPropagation();
          div.appendChild(handle);
        }

        div.appendChild(document.createTextNode(name));
        div.onclick = () => { switchChannel(ch.id, name); cancelEdit(); };

        if (isAdmin && !isRules) {
          const delBtn = document.createElement('span');
          delBtn.className = 'del-ch';
          delBtn.title = 'Delete channel';
          delBtn.textContent = '×';
          delBtn.onclick = (e) => deleteChannel(ch.id, name, e);
          div.appendChild(delBtn);
        }

        if (isAdmin) {
          div.addEventListener('dragstart', handleDragStart);
          div.addEventListener('dragend', handleDragEnd);
          div.addEventListener('dragover', handleDragOver);
          div.addEventListener('drop', handleDrop);
        }

        list.appendChild(div);
      });

      // Channel selection logic
      if (!currentChannelId) {
        const isAdmin = currentUser.uid === ADMIN_UID;
        const hasAcceptedRules = isAdmin || rulesAccepted;

        if (hasAcceptedRules && currentUser.lastChannelId && data[currentUser.lastChannelId]) {
          switchChannel(currentUser.lastChannelId, data[currentUser.lastChannelId].name);
        } else if (!hasAcceptedRules && rulesChannelId) {
          switchChannel(rulesChannelId, 'rules');
        } else {
          const firstNonRules = channelsArray.find(ch => ch.id !== rulesChannelId);
          if (firstNonRules) {
            switchChannel(firstNonRules.id, firstNonRules.name);
          } else if (channelsArray.length > 0) {
            switchChannel(channelsArray[0].id, channelsArray[0].name);
          }
        }
      }
    });
  }

  // ── READ‑ONLY / RULES GATE ─────────────────────────────
  function updateRulesUI(channelId, channelData) {
    const gate      = document.getElementById('rules-gate');
    const readonly  = document.getElementById('rules-readonly');
    const inputArea = document.querySelector('.input-area');
    const msgBox    = document.getElementById('messages-container');
    const isAdmin   = currentUser.uid === ADMIN_UID;

    const isRules = channelId === rulesChannelId;
    const isReadOnly = isRules || (channelData?.readonly === true);

    if (rulesScrollHandler) {
      msgBox.removeEventListener('scroll', rulesScrollHandler);
      rulesScrollHandler = null;
    }

    if (isReadOnly && !isAdmin) {
      inputArea.classList.add('hidden');
      readonly.classList.remove('hidden');

      if (isRules && !rulesAccepted) {
        gate.className = 'gate-scroll';
        gate.innerHTML = `
          <div style="display:flex; flex-direction:column; gap:10px;">
            <div id="rules-msg">📜 <strong>Read to the bottom to access server</strong><br>
            <span style="font-size:11px">Scroll down ↓</span></div>
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; opacity:0.6;" id="rules-checkbox-label">
              <input type="checkbox" id="rules-checkbox" disabled>
              <span>I have read and understood the rules</span>
            </label>
            <button id="btn-accept-rules" class="btn-accept-rules" disabled>Accept & Unlock</button>
          </div>
        `;
        const checkbox = document.getElementById('rules-checkbox');
        const label    = document.getElementById('rules-checkbox-label');
        const btn      = document.getElementById('btn-accept-rules');
        const setGateState = () => {
          const atBottom = msgBox.scrollTop + msgBox.clientHeight >= msgBox.scrollHeight - 60;
          const rulesMsg = document.getElementById('rules-msg');
          if (atBottom) {
            gate.className = 'gate-accept';
            checkbox.disabled = false;
            label.style.opacity = '1';
            rulesMsg.innerHTML = `
              ✅ <strong>You've reached the end!</strong><br>
              <span style="font-size:11px">Please confirm you've read the rules</span>
            `;
          } else {
            gate.className = 'gate-scroll';
            checkbox.disabled = true;
            label.style.opacity = '0.6';
            rulesMsg.innerHTML = `
              📜 <strong>Read to the bottom to unlock channels</strong><br>
              <span style="font-size:11px">Scroll down ↓</span>
            `;
          }
          btn.disabled = !(checkbox.checked && atBottom);
        };
        checkbox.addEventListener('change', () => {
          const atBottom = msgBox.scrollTop + msgBox.clientHeight >= msgBox.scrollHeight - 60;
          btn.disabled = !(checkbox.checked && atBottom);
        });
        rulesScrollHandler = setGateState;
        msgBox.addEventListener('scroll', rulesScrollHandler);
        setTimeout(setGateState, 800);
        btn.onclick = acceptRules;
      } else {
        gate.className = 'hidden';
      }
    } else {
      gate.className = 'hidden';
      readonly.classList.add('hidden');
      inputArea.classList.remove('hidden');
    }
    if (isRules && !isAdmin && !rulesAccepted) {
      msgBox.scrollTop = 0;
    }
  }

  function switchChannel(id, name) {
    cancelEdit();
    currentChannelId = id;
    document.getElementById('active-ch-title').innerText = name;
    document.getElementById('messages-container').innerHTML = '';
    document.querySelectorAll('.channel-item').forEach(el => {
      el.classList.toggle('active', el.dataset.chId === id);
    });
    if (messagesAddedUnsubscribe) { messagesAddedUnsubscribe(); messagesAddedUnsubscribe = null; }
    if (messagesRemovedUnsubscribe) { messagesRemovedUnsubscribe(); messagesRemovedUnsubscribe = null; }
    if (messagesChangedUnsubscribe) { messagesChangedUnsubscribe(); messagesChangedUnsubscribe = null; }
    if (currentUser) {
      window.fbSet(window.fbRef(window.db, `users/${currentUser.uid}/lastChannel`), id);
    }
    const msgRef = window.fbRef(window.db, `messages/${id}`);
    messagesAddedUnsubscribe = window.fbOnChildAdded(msgRef, (snap) => {
      renderMessage(snap.val(), snap.key);
    });
    messagesRemovedUnsubscribe = window.fbOnChildRemoved(msgRef, (snap) => {
      const el = document.getElementById(`msg-${snap.key}`);
      if (el) el.remove();
    });
    messagesChangedUnsubscribe = window.fbOnChildChanged(msgRef, (snap) => {
      const el = document.getElementById(`msg-${snap.key}`);
      if (!el) return;
      const prevEl = el.previousElementSibling;
      let isGrouped = false;
      if (prevEl?.dataset.msgSender && prevEl?.dataset.msgTs) {
        isGrouped = shouldGroupMessages(
          { senderUid: prevEl.dataset.msgSender, ts: parseInt(prevEl.dataset.msgTs) },
          snap.val()
        );
      }
      el.replaceWith(renderMessageElement(snap.val(), snap.key, isGrouped));
    });
    subscribeTyping(id);

    // Fetch channel data to pass to updateRulesUI
    window.fbOnValue(window.fbRef(window.db, `channels/${id}`), (snap) => {
      updateRulesUI(id, snap.val());
    }, { onlyOnce: true });
  }

  // ── INIT (add order migration) ────────────────────────
  // Inside setupApp, after the user is loaded and presence setup, add this:
  // (Place it right before the closing brace of setupApp)
  if (currentUser.uid === ADMIN_UID) {
    window.fbOnValue(window.fbRef(window.db, 'channels'), (snap) => {
      const data = snap.val() || {};
      let needsOrder = false;
      Object.values(data).forEach(ch => {
        if (ch.order === undefined) needsOrder = true;
      });
      if (needsOrder) {
        const updates = {};
        Object.entries(data).forEach(([id, ch], idx) => {
          if (ch.order === undefined) updates[`${id}/order`] = idx;
        });
        if (Object.keys(updates).length) window.fbUpdate(window.fbRef(window.db, 'channels'), updates);
      }
    }, { onlyOnce: true });
  }

  // ... (all other existing functions remain exactly as you have them) ...

</script>
